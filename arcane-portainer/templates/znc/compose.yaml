services:
  znc:
    image: "linuxserver/znc:latest"
    container_name: ${CONTAINER_NAME:-znc}
    restart: "unless-stopped"
    ports:
      - "6501:6501/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/znc/config:/config"
