services:
  stalwart-mail:
    image: "stalwartlabs/stalwart:latest"
    container_name: ${CONTAINER_NAME:-stalwart-mail}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
      - "443:443/tcp"
      - "25:25/tcp"
      - "587:587/tcp"
      - "465:465/tcp"
      - "143:143/tcp"
      - "993:993/tcp"
    volumes:
      - "opt-stalwart:/opt/stalwart"

volumes:
  opt-stalwart:
