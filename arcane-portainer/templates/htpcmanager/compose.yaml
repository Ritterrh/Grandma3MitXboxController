services:
  htpcmanager:
    image: "linuxserver/htpcmanager:latest"
    container_name: ${CONTAINER_NAME:-htpcmanager}
    restart: "unless-stopped"
    ports:
      - "8085:8085/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/htpcmanager/config:/config"
