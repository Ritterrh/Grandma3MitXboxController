services:
  kimai:
    image: "linuxserver/kimai:latest"
    container_name: ${CONTAINER_NAME:-kimai}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "DATABASE_URL=${DATABASE_URL:-mysql://your_db_user:your_db_pass@your_db_host:3306/your_db_name?charset=your_db_charset&serverVersion=your_db_version}"
      - "TRUSTED_PROXIES=${TRUSTED_PROXIES:-127.0.0.1/32}"
    volumes:
      - "/srv/lsio/kimai/config:/config"
