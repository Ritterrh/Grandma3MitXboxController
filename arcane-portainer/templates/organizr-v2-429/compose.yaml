services:
  organizr-v2-429:
    image: "organizr/organizr:latest"
    container_name: ${CONTAINER_NAME:-organizr-v2-429}
    restart: "unless-stopped"
    ports:
      - "7171:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
    volumes:
      - "/portainer/Files/AppData/Config/Organizr:/config"
