services:
  msedge:
    image: "linuxserver/msedge:latest"
    container_name: ${CONTAINER_NAME:-msedge}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "EDGE_CLI=${EDGE_CLI:-https://www.linuxserver.io/}"
    volumes:
      - "/srv/lsio/msedge/config:/config"
