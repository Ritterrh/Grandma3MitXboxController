version: "3"

services:
  listmonk:
    image: listmonk/listmonk:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    command:
      [sh, -c, "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
    environment:
      - LISTMONK_app__address=${LISTMONK_app__address:-0.0.0.0:9000}
      - LISTMONK_db__host=${LISTMONK_db__host:-postgres}
      - LISTMONK_db__port=${LISTMONK_db__port:-5432}
      - LISTMONK_db__user=${LISTMONK_db__user:-listmonk}
      - LISTMONK_db__password=${LISTMONK_db__password:-change-me}
      - LISTMONK_db__database=${LISTMONK_db__database:-listmonk}
      - LISTMONK_db__ssl_mode=${LISTMONK_db__ssl_mode:-disable}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - listmonk-uploads:/listmonk/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-listmonk}
      - POSTGRES_USER=${POSTGRES_USER:-listmonk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  listmonk-uploads:
  postgres-data:
