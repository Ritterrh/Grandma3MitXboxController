services:
  ombi:
    image: lscr.io/linuxserver/ombi:latest
    container_name: ombi
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Athens}
      - BASE_URL=${BASE_URL:-/ombi}
    volumes:
      - /portainer/Files/AppData/Config/ombi:/config
    ports:
      - 3579:3579
    restart: unless-stopped
