services:
  privatebin:
    image: "privatebin/nginx-fpm-alpine:latest"
    container_name: ${CONTAINER_NAME:-privatebin}
    privileged: true
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
    volumes:
      - "/portainer/Files/AppData/PrivateBin:/srv/data"
      - "/portainer/Files/AppData/Config/PrivateBin:/srv/cfg"
