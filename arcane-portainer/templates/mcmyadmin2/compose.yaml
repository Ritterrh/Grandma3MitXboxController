services:
  mcmyadmin2:
    image: "linuxserver/mcmyadmin2:latest"
    container_name: ${CONTAINER_NAME:-mcmyadmin2}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
      - "25565:25565/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-100}"
    volumes:
      - "minecraft:/minecraft"

volumes:
  minecraft:
