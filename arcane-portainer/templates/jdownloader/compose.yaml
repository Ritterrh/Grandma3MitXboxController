services:
  jdownloader:
    image: "jaymoulin/jdownloader:latest"
    container_name: ${CONTAINER_NAME:-jdownloader}
    restart: "unless-stopped"
    ports:
      - "3129:3129/tcp"
    environment:
      - "MYJD_DEVICE_NAME=${MYJD_DEVICE_NAME:-}"
      - "MYJD_USER=${MYJD_USER:-user}"
      - "MYJD_PASSWORD=${MYJD_PASSWORD:-change-me}"
    volumes:
      - "/portainer/Files/AppData/Config/JDownloader:/opt/JDownloader/app/cfg"
      - "/portainer/Downloads:/opt/JDownloader/Downloads"
