services:
  freshrss:
    image: "linuxserver/freshrss:latest"
    container_name: ${CONTAINER_NAME:-freshrss}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/freshrss/config:/config"
