services:
  stump:
    image: "aaronleopold/stump:latest"
    container_name: ${CONTAINER_NAME:-stump}
    restart: "unless-stopped"
    ports:
      - "10801:10801/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "STUMP_CONFIG_DIR=${STUMP_CONFIG_DIR:-/config}"
    volumes:
      - "config:/config"
      - "data:/data"

volumes:
  config:
  data:
