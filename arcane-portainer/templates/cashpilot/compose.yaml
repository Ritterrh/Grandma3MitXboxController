services:
  cashpilot:
    image: "drumsergio/cashpilot:latest"
    container_name: ${CONTAINER_NAME:-cashpilot}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "TZ=${TZ:-UTC}"
      - "CASHPILOT_SECRET_KEY=${CASHPILOT_SECRET_KEY:-change-me}"
      - "CASHPILOT_API_KEY=${CASHPILOT_API_KEY:-change-me}"
    volumes:
      - "data:/data"

volumes:
  data:
