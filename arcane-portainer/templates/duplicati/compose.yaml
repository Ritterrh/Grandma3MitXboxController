services:
  duplicati:
    image: "linuxserver/duplicati:latest"
    container_name: ${CONTAINER_NAME:-duplicati}
    restart: "unless-stopped"
    ports:
      - "8200:8200/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:-change-me}"
      - "CLI_ARGS=${CLI_ARGS:-}"
      - "DUPLICATI__WEBSERVICE_PASSWORD=${DUPLICATI__WEBSERVICE_PASSWORD:-change-me}"
    volumes:
      - "/srv/lsio/duplicati/config:/config"
      - "/srv/lsio/duplicati/backups:/backups"
      - "/srv/lsio/duplicati/source:/source"
