services:
  netbox:
    image: "linuxserver/netbox:latest"
    container_name: ${CONTAINER_NAME:-netbox}
    restart: "unless-stopped"
    ports:
      - "8000:8000/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "SUPERUSER_EMAIL=${SUPERUSER_EMAIL:-}"
      - "SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-change-me}"
      - "ALLOWED_HOST=${ALLOWED_HOST:-localhost}"
      - "DB_NAME=${DB_NAME:-app}"
      - "DB_USER=${DB_USER:-user}"
      - "DB_PASSWORD=${DB_PASSWORD:-change-me}"
      - "DB_HOST=${DB_HOST:-localhost}"
      - "DB_PORT=${DB_PORT:-8080}"
      - "REDIS_HOST=${REDIS_HOST:-localhost}"
      - "REDIS_PORT=${REDIS_PORT:-8080}"
      - "REDIS_USERNAME=${REDIS_USERNAME:-user}"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-change-me}"
      - "REDIS_DB_TASK=${REDIS_DB_TASK:-}"
      - "REDIS_DB_CACHE=${REDIS_DB_CACHE:-}"
      - "BASE_PATH=${BASE_PATH:-./data}"
      - "CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}"
      - "REMOTE_AUTH_ENABLED=${REMOTE_AUTH_ENABLED:-}"
      - "REMOTE_AUTH_BACKEND=${REMOTE_AUTH_BACKEND:-}"
      - "REMOTE_AUTH_HEADER=${REMOTE_AUTH_HEADER:-}"
      - "REMOTE_AUTH_AUTO_CREATE_USER=${REMOTE_AUTH_AUTO_CREATE_USER:-user}"
      - "REMOTE_AUTH_DEFAULT_GROUPS=${REMOTE_AUTH_DEFAULT_GROUPS:-}"
      - "REMOTE_AUTH_DEFAULT_PERMISSIONS=${REMOTE_AUTH_DEFAULT_PERMISSIONS:-}"
    volumes:
      - "/srv/lsio/netbox/config:/config"
