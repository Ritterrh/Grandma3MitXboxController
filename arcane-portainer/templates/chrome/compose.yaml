services:
  chrome:
    image: "linuxserver/chrome:latest"
    container_name: ${CONTAINER_NAME:-chrome}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "CHROME_CLI=${CHROME_CLI:-https://www.linuxserver.io/}"
    volumes:
      - "/srv/lsio/chrome/config:/config"
