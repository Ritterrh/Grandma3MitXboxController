services:
  piwigo:
    image: "linuxserver/piwigo:latest"
    container_name: ${CONTAINER_NAME:-piwigo}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/piwigo/config:/config"
      - "/srv/lsio/piwigo/gallery:/gallery"
