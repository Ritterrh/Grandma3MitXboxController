services:
  faster-whisper:
    image: "linuxserver/faster-whisper:latest"
    container_name: ${CONTAINER_NAME:-faster-whisper}
    restart: "unless-stopped"
    ports:
      - "10300:10300/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "DEBUG=${DEBUG:-}"
      - "LOCAL_ONLY=${LOCAL_ONLY:-}"
      - "WHISPER_BEAM=${WHISPER_BEAM:-1}"
      - "WHISPER_LANG=${WHISPER_LANG:-auto}"
      - "WHISPER_MODEL=${WHISPER_MODEL:-auto}"
    volumes:
      - "/srv/lsio/faster-whisper/config:/config"
