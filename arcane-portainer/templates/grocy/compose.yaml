services:
  grocy:
    image: "linuxserver/grocy:latest"
    container_name: ${CONTAINER_NAME:-grocy}
    restart: "unless-stopped"
    ports:
      - "9283:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/grocy/config:/config"
