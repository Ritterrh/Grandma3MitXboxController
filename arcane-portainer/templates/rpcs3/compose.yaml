services:
  rpcs3:
    image: "linuxserver/rpcs3:latest"
    container_name: ${CONTAINER_NAME:-rpcs3}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/rpcs3/config:/config"
