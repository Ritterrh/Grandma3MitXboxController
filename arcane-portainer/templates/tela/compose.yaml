version: "3.8"

# tela — self-hostable markdown-native team wiki (https://telawiki.com)
# Caddy `proxy` is the only web-exposed service and is the mandatory single
# entrypoint; it fronts the Go `backend` and the static `frontend`. Postgres
# uses the pgvector image (semantic search needs the `vector` extension).
# The three required secrets have NO defaults — set them in Portainer before
# deploying and keep them stable (rotating TELA_API_KEY_SECRET invalidates all
# personal access tokens). After the stack is up, open :8780 and complete /setup
# to create the admin account.

services:

  proxy:
    image: ghcr.io/zcag/tela-proxy:0.7.0
    restart: unless-stopped
    environment:
      TELA_SITE_ADDRESS: "${TELA_SITE_ADDRESS:-:80}"
      TELA_UPSTREAM_BACKEND: "${TELA_UPSTREAM_BACKEND:-backend:8080}"
      TELA_UPSTREAM_FRONTEND: "${TELA_UPSTREAM_FRONTEND:-frontend:80}"
    ports:
      - "8780:80"
    volumes:
      - tela-caddy-data:/data
      - tela-caddy-config:/config
    depends_on:
      - backend
      - frontend

  backend:
    image: ghcr.io/zcag/tela-backend:0.7.0
    restart: unless-stopped
    environment:
      TELA_PUBLIC_BASE_URL: ${TELA_PUBLIC_BASE_URL:-http://localhost:8780}
      TELA_SHARE_SECRET: ${TELA_SHARE_SECRET:-change-me}
      TELA_API_KEY_SECRET: ${TELA_API_KEY_SECRET:-change-me}
      TELA_DATABASE_URL: postgres://tela:${TELA_PG_PASSWORD:-change-me}@postgres:5432/tela?sslmode=disable
      TELA_GOTENBERG_URL: "${TELA_GOTENBERG_URL:-http://gotenberg:3000}"
      TELA_PDF_RENDER_BASE_URL: "${TELA_PDF_RENDER_BASE_URL:-http://proxy}"
      TELA_DECK_URL: "${TELA_DECK_URL:-http://deck:3344}"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-tela}"
      POSTGRES_PASSWORD: ${TELA_PG_PASSWORD:-change-me}
      POSTGRES_DB: "${POSTGRES_DB:-tela}"
    volumes:
      - tela-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tela -d tela"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    image: ghcr.io/zcag/tela-frontend:0.7.0
    restart: unless-stopped
    expose:
      - "80"

  deck:
    image: ghcr.io/zcag/tela-deck:0.7.0
    restart: unless-stopped
    volumes:
      - tela-deckcache:/data
    expose:
      - "3344"

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    expose:
      - "3000"

volumes:
  tela-pgdata:
  tela-deckcache:
  tela-caddy-data:
  tela-caddy-config:
