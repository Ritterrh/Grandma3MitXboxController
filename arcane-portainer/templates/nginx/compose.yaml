services:
  nginx:
    image: "linuxserver/nginx:latest"
    container_name: ${CONTAINER_NAME:-nginx}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "NGINX_AUTORELOAD=${NGINX_AUTORELOAD:-}"
      - "NGINX_AUTORELOAD_WATCHLIST=${NGINX_AUTORELOAD_WATCHLIST:-}"
    volumes:
      - "/srv/lsio/nginx/config:/config"
