services:
  cops:
    image: "linuxserver/cops:latest"
    container_name: ${CONTAINER_NAME:-cops}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/cops/config:/config"
      - "/srv/lsio/cops/books:/books"
