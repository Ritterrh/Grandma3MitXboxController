services:
  xbackbone:
    image: "linuxserver/xbackbone:latest"
    container_name: ${CONTAINER_NAME:-xbackbone}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/xbackbone/config:/config"
