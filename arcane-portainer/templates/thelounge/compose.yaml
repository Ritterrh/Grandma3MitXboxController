services:
  thelounge:
    image: "linuxserver/thelounge:latest"
    container_name: ${CONTAINER_NAME:-thelounge}
    restart: "unless-stopped"
    ports:
      - "9000:9000/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/thelounge/config:/config"
