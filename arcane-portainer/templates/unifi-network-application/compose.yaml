services:
  unifi-network-application:
    image: "linuxserver/unifi-network-application:latest"
    container_name: ${CONTAINER_NAME:-unifi-network-application}
    restart: "unless-stopped"
    ports:
      - "8443:8443/tcp"
      - "3478:3478/udp"
      - "10001:10001/udp"
      - "8080:8080/tcp"
      - "1900:1900/udp"
      - "8843:8843/tcp"
      - "8880:8880/tcp"
      - "6789:6789/tcp"
      - "5514:5514/udp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "MONGO_USER=${MONGO_USER:-unifi}"
      - "MONGO_PASS=${MONGO_PASS:-change-me}"
      - "MONGO_HOST=${MONGO_HOST:-unifi-db}"
      - "MONGO_PORT=${MONGO_PORT:-27017}"
      - "MONGO_DBNAME=${MONGO_DBNAME:-unifi}"
      - "MONGO_AUTHSOURCE=${MONGO_AUTHSOURCE:-admin}"
      - "MEM_LIMIT=${MEM_LIMIT:-1024}"
      - "MEM_STARTUP=${MEM_STARTUP:-1024}"
      - "MONGO_TLS=${MONGO_TLS:-}"
    volumes:
      - "/srv/lsio/unifi-network-application/config:/config"
