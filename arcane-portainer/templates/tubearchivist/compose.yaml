services:
  tubearchivist:
    container_name: tubearchivist
    restart: unless-stopped
    image: bbilly1/tubearchivist
    ports:
      - 8999:8000
    volumes:
      - /portainer/media:/youtube
      - /portainer/cache:/cache
    environment:
      - ES_URL=${ES_URL:-http://archivist-es:9200}
      - REDIS_HOST=${REDIS_HOST:-archivist-redis}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - TA_HOST=${TA_HOST:-INSERT_YOURIP_OR_HOSTNAME}
      - TA_USERNAME=${TA_USERNAME:-tubearchivist}
      - TA_PASSWORD=${TA_PASSWORD:-change-me}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-change-me}
      - TZ=${TZ:-Europe/Athens}
    depends_on:
      - archivist-es
      - archivist-redis
  archivist-redis:
    image: redis/redis-stack-server
    container_name: archivist-redis
    restart: unless-stopped
    expose:
      - 6379
    volumes:
      - /portainer/Files/AppData/Config/tubearchivist/redis:/data
    depends_on:
      - archivist-es
  archivist-es:
    image: bbilly1/tubearchivist-es         # only for amd64, or use official es 8.7.0
    container_name: archivist-es
    restart: unless-stopped
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-change-me}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      - xpack.security.enabled=true
      - discovery.type=single-node
      - path.repo=/usr/share/elasticsearch/data/snapshot
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - /portainer/Files/AppData/Config/tubearchivist/es:/usr/share/elasticsearch/data    # check for permission error when using bind mount, see readme
    expose:
      - 9200
