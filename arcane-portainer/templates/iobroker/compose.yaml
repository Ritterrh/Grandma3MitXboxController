services:
  iobroker:
    image: "buanet/iobroker:latest"
    container_name: ${CONTAINER_NAME:-iobroker}
    restart: "unless-stopped"
    ports:
      - "8081:8081/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
    volumes:
      - "/portainer/Files/AppData/Config/iobrokerdata:/opt/iobroker"
