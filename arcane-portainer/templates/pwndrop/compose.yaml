services:
  pwndrop:
    image: "linuxserver/pwndrop:latest"
    container_name: ${CONTAINER_NAME:-pwndrop}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "SECRET_PATH=${SECRET_PATH:-change-me}"
    volumes:
      - "/srv/lsio/pwndrop/config:/config"
