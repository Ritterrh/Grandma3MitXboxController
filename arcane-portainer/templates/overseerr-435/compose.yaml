services:
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Athens}
    volumes:
      - /portainer/Files/AppData/Config/overseer:/config
    ports:
      - 5055:5055
    restart: unless-stopped
