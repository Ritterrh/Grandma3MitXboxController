services:
  sealskin:
    image: "linuxserver/sealskin:latest"
    container_name: ${CONTAINER_NAME:-sealskin}
    restart: "unless-stopped"
    ports:
      - "8443:8443/tcp"
      - "8000:8000/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "HOST_URL=${HOST_URL:-IP or subdomain.doman.com}"
    volumes:
      - "/srv/lsio/sealskin/config:/config"
      - "/srv/lsio/sealskin/storage:/storage"
      - "/var/run/docker.sock:/var/run/docker.sock"
