services:
  opera:
    image: "linuxserver/opera:latest"
    container_name: ${CONTAINER_NAME:-opera}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "OPERA_CLI=${OPERA_CLI:-https://www.linuxserver.io/}"
    volumes:
      - "/srv/lsio/opera/config:/config"
