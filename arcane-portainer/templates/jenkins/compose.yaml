services:
  jenkins:
    image: "jenkins/jenkins:lts"
    container_name: ${CONTAINER_NAME:-jenkins}
    restart: "unless-stopped"
    ports:
      - "8080/tcp"
      - "50000/tcp"
    environment:
      - "JENKINS_OPTS=${JENKINS_OPTS:-}"
    volumes:
      - "var-jenkins-home:/var/jenkins_home"

volumes:
  var-jenkins-home:
