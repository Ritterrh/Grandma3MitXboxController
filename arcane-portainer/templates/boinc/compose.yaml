services:
  boinc:
    image: "linuxserver/boinc:latest"
    container_name: ${CONTAINER_NAME:-boinc}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
      - "8181:8181/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "PASSWORD=${PASSWORD:-change-me}"
    volumes:
      - "/srv/lsio/boinc/config:/config"
