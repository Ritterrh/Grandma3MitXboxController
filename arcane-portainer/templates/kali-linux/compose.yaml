services:
  kali-linux:
    image: "linuxserver/kali-linux:latest"
    container_name: ${CONTAINER_NAME:-kali-linux}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/kali-linux/config:/config"
