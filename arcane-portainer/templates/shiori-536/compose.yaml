services:
  shiori:
    image: ghcr.io/go-shiori/shiori
    container_name: shiori-default
    environment:
      - TZ=${TZ:-Europe/Athens}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - 8580:8080
    restart: unless-stopped
    volumes:
      - /portainer/Files/AppData/Config/shiori:/data

