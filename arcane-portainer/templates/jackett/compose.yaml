services:
  jackett:
    image: "linuxserver/jackett:latest"
    container_name: ${CONTAINER_NAME:-jackett}
    restart: "unless-stopped"
    ports:
      - "9117:9117/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "AUTO_UPDATE=${AUTO_UPDATE:-true}"
      - "RUN_OPTS=${RUN_OPTS:-}"
    volumes:
      - "/srv/lsio/jackett/config:/config"
      - "/srv/lsio/jackett/downloads:/downloads"
