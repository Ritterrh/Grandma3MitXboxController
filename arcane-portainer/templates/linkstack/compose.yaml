services:

  linkstack:
    hostname: linkstack
    image: linkstackorg/linkstack:latest
    environment:
      TZ: "${TZ:-Europe/Athens}"
      SERVER_ADMIN: "${SERVER_ADMIN:-admin@example.com}"
      HTTP_SERVER_NAME: "${HTTP_SERVER_NAME:-example.com}"
      HTTPS_SERVER_NAME: "${HTTPS_SERVER_NAME:-example.com}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      PHP_MEMORY_LIMIT: "${PHP_MEMORY_LIMIT:-256M}"
      UPLOAD_MAX_FILESIZE: "${UPLOAD_MAX_FILESIZE:-8M}"
    volumes:
      - linkstack_data:/htdocs
    ports:
      - 8188:80
      - 8190:443
    restart: unless-stopped
volumes:
  linkstack_data:
    driver: local
    driver_opts:
      type: none
      device: "/mnt/extra/portainer/Files/AppData/Config/linkstack"
      o: bind
