services:
  babybuddy:
    image: "linuxserver/babybuddy:latest"
    container_name: ${CONTAINER_NAME:-babybuddy}
    restart: "unless-stopped"
    ports:
      - "8000:8000/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8000,https://babybuddy.domain.com}"
    volumes:
      - "/srv/lsio/babybuddy/config:/config"
