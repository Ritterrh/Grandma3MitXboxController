services:
  qemu-static:
    image: "linuxserver/qemu-static:latest"
    container_name: ${CONTAINER_NAME:-qemu-static}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/qemu-static/config:/config"
