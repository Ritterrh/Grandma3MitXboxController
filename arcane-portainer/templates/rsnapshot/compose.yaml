services:
  rsnapshot:
    image: "linuxserver/rsnapshot:latest"
    container_name: ${CONTAINER_NAME:-rsnapshot}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/rsnapshot/config:/config"
      - "/srv/lsio/rsnapshot/.snapshots:/.snapshots"
      - "/srv/lsio/rsnapshot/data:/data"
