services:
  synclounge:
    image: "linuxserver/synclounge:latest"
    container_name: ${CONTAINER_NAME:-synclounge}
    restart: "unless-stopped"
    ports:
      - "8088:8088/tcp"
    environment:
      - "AUTH_LIST=${AUTH_LIST:-plexuser1,plexuser2,email1,machineid1}"
    volumes:
      - "/srv/lsio/synclounge/config:/config"
