services:
  homeassistant:
    image: "linuxserver/homeassistant:latest"
    container_name: ${CONTAINER_NAME:-homeassistant}
    restart: "unless-stopped"
    ports:
      - "8123:8123/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/homeassistant/config:/config"
