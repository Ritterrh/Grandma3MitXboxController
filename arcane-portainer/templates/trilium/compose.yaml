services:
  trilium:
    image: "zadam/trilium:latest"
    container_name: ${CONTAINER_NAME:-trilium}
    restart: "unless-stopped"
    ports:
      - "3388:8080/tcp"
    environment:
      - "TRILIUM_DATA_DIR=${TRILIUM_DATA_DIR:-/home/node/trilium-data}"
      - "PORT=${PORT:-8080}"
    volumes:
      - "/portainer/Files/AppData/Config/trilium-data:/home/node/trilium-data"
