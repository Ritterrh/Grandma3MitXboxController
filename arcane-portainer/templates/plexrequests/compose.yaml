services:
  plexrequests:
    image: "linuxserver/plexrequests:latest"
    container_name: ${CONTAINER_NAME:-plexrequests}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-100}"
      - "URL_BASE=${URL_BASE:-}"
    volumes:
      - "/portainer/Files/AppData/Config/PlexRequests:/config"
