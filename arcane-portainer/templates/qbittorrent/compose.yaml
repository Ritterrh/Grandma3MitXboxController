services:
  qbittorrent:
    image: "linuxserver/qbittorrent:latest"
    container_name: ${CONTAINER_NAME:-qbittorrent}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "WEBUI_PORT=${WEBUI_PORT:-8080}"
      - "TORRENTING_PORT=${TORRENTING_PORT:-6881}"
    volumes:
      - "/srv/lsio/qbittorrent/config:/config"
      - "/srv/lsio/qbittorrent/downloads:/downloads"
