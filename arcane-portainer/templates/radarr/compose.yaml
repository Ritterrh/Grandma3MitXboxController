services:
  radarr:
    image: "linuxserver/radarr:latest"
    container_name: ${CONTAINER_NAME:-radarr}
    restart: "unless-stopped"
    ports:
      - "7878:7878/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/radarr/config:/config"
      - "/srv/lsio/radarr/movies:/movies"
      - "/srv/lsio/radarr/downloads:/downloads"
