services:
  shadps4:
    image: "linuxserver/shadps4:latest"
    container_name: ${CONTAINER_NAME:-shadps4}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/shadps4/config:/config"
