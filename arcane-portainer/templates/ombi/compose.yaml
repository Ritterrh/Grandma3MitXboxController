services:
  ombi:
    image: "linuxserver/ombi:latest"
    container_name: ${CONTAINER_NAME:-ombi}
    restart: "unless-stopped"
    ports:
      - "3579:3579/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "BASE_URL=${BASE_URL:-/}"
    volumes:
      - "/srv/lsio/ombi/config:/config"
