services:
  sql-server-express:
    image: "microsoft/mssql-server-windows-express:latest"
    container_name: ${CONTAINER_NAME:-sql-server-express}
    restart: "unless-stopped"
    ports:
      - "1433/tcp"
    environment:
      - "ACCEPT_EULA=${ACCEPT_EULA:-Y}"
      - "SA_PASSWORD=${SA_PASSWORD:-change-me}"
    volumes:
      - "c-temp:C:/temp/"

volumes:
  c-temp:
