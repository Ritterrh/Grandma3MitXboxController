services:
  kodi-headless:
    image: "lsioarmhf/kodi-headless:latest"
    container_name: ${CONTAINER_NAME:-kodi-headless}
    restart: "unless-stopped"
    ports:
      - "8081:8080/tcp"
      - "9090:9090/tcp"
      - "9777:9777/udp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
    volumes:
      - "/portainer/Files/AppData/Config/Kodi:/config/.kodi"
