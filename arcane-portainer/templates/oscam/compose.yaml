services:
  oscam:
    image: "linuxserver/oscam:latest"
    container_name: ${CONTAINER_NAME:-oscam}
    restart: "unless-stopped"
    ports:
      - "8888:8888/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/oscam/config:/config"
