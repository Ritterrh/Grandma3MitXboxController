services:
  bambustudio:
    image: "linuxserver/bambustudio:latest"
    container_name: ${CONTAINER_NAME:-bambustudio}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "DARK_MODE=${DARK_MODE:-true}"
    volumes:
      - "/srv/lsio/bambustudio/config:/config"
