services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://umami:umami@db:5432/umami}"
      DATABASE_TYPE: "${DATABASE_TYPE:-postgresql}"
      HASH_SALT: "${HASH_SALT:-replace-me-with-a-random-string}"
    depends_on:
      - db
    restart: always
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-umami}"
      POSTGRES_USER: "${POSTGRES_USER:-umami}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - /portainer/Files/AppData/Config/umami:/docker-entrypoint-initdb.d/schema.postgresql.sql:ro
      - umami-db-data:/var/lib/postgresql/data
    restart: always
volumes:
  umami-db-data:
