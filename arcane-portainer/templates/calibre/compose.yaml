services:
  calibre:
    image: "linuxserver/calibre:latest"
    container_name: ${CONTAINER_NAME:-calibre}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
      - "8181:8181/tcp"
      - "8081:8081/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "PASSWORD=${PASSWORD:-change-me}"
      - "CLI_ARGS=${CLI_ARGS:-}"
    volumes:
      - "/srv/lsio/calibre/config:/config"
