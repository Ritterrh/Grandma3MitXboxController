version: "3"

services:
  docmost:
    image: docmost/docmost:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - APP_URL=${APP_URL:-http://localhost:3000}
      - APP_SECRET=${APP_SECRET:-change-me}
      - DATABASE_URL=${DATABASE_URL:-postgresql://docmost:docmost@postgres:5432/docmost?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - docmost-data:/app/data/storage
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-docmost}
      - POSTGRES_USER=${POSTGRES_USER:-docmost}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data

volumes:
  docmost-data:
  postgres-data:
  redis-data:
