services:
  limnoria:
    image: "linuxserver/limnoria:latest"
    container_name: ${CONTAINER_NAME:-limnoria}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/limnoria/config:/config"
