services:
  beets:
    image: "linuxserver/beets:latest"
    container_name: ${CONTAINER_NAME:-beets}
    restart: "unless-stopped"
    ports:
      - "8337:8337/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/beets/config:/config"
      - "/srv/lsio/beets/music:/music"
      - "/srv/lsio/beets/downloads:/downloads"
