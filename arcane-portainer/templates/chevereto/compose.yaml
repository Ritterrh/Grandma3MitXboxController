services:
  chevereto:
    image: "nmtan/chevereto:latest"
    container_name: ${CONTAINER_NAME:-chevereto}
    restart: "unless-stopped"
    ports:
      - "7382:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "CHEVERETO_DB_HOST=${CHEVERETO_DB_HOST:-localhost}"
      - "CHEVERETO_DB_USERNAME=${CHEVERETO_DB_USERNAME:-user}"
      - "CHEVERETO_DB_PASSWORD=${CHEVERETO_DB_PASSWORD:-change-me}"
      - "CHEVERETO_DB_NAME=${CHEVERETO_DB_NAME:-app}"
      - "CHEVERETO_DB_PREFIX=${CHEVERETO_DB_PREFIX:-}"
    volumes:
      - "var-www-html-images:/var/www/html/images"

volumes:
  var-www-html-images:
