services:
  sabnzbd:
    image: "linuxserver/sabnzbd:latest"
    container_name: ${CONTAINER_NAME:-sabnzbd}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/sabnzbd/config:/config"
      - "/srv/lsio/sabnzbd/incomplete-downloads:/incomplete-downloads"
      - "/srv/lsio/sabnzbd/downloads:/downloads"
