services:
  modmanager:
    image: "linuxserver/modmanager:latest"
    container_name: ${CONTAINER_NAME:-modmanager}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/modmanager/config:/config"
