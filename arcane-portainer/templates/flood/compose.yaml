services:
  qflood:
    container_name: qflood
    image: hotio/qflood
    restart: always
    ports:
      - "8282:8080"
      - "3223:3000"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=${UMASK:-002}
      - TZ=${TZ:-Europe/Athens}
      - FLOOD_AUTH=${FLOOD_AUTH:-false}
    volumes:
      - /portainer/Files/AppData/Config/flood:/config
