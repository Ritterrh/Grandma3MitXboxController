services:
  mullvad-browser:
    image: "linuxserver/mullvad-browser:latest"
    container_name: ${CONTAINER_NAME:-mullvad-browser}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "3001:3001/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "LOCAL_NET=${LOCAL_NET:-192.168.0.0/16}"
    volumes:
      - "/srv/lsio/mullvad-browser/config:/config"
