services:
  adguardhome-sync:
    image: "linuxserver/adguardhome-sync:latest"
    container_name: ${CONTAINER_NAME:-adguardhome-sync}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "CONFIGFILE=${CONFIGFILE:-/config/adguardhome-sync.yaml}"
    volumes:
      - "/srv/lsio/adguardhome-sync/config:/config"
