services:
  luanti:
    image: "linuxserver/luanti:latest"
    container_name: ${CONTAINER_NAME:-luanti}
    restart: "unless-stopped"
    ports:
      - "30000:30000/udp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "CLI_ARGS=${CLI_ARGS:---gameid devtest}"
    volumes:
      - "/srv/lsio/luanti/config/.minetest:/config/.minetest"
