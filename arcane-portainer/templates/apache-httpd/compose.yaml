services:
  apache-httpd:
    image: "httpd:latest"
    container_name: ${CONTAINER_NAME:-apache-httpd}
    restart: "unless-stopped"
    ports:
      - "8080:80/tcp"
      - "8443:443/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
    volumes:
      - "/portainer/Files/AppData/Config/apache-httpd:/usr/local/apache2/htdocs/"
