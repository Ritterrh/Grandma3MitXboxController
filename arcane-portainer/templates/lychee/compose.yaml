services:
  lychee:
    image: "linuxserver/lychee:latest"
    container_name: ${CONTAINER_NAME:-lychee}
    restart: "unless-stopped"
    ports:
      - "80:80/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "DB_CONNECTION=${DB_CONNECTION:-}"
      - "DB_HOST=${DB_HOST:-localhost}"
      - "DB_PORT=${DB_PORT:-8080}"
      - "DB_USERNAME=${DB_USERNAME:-user}"
      - "DB_PASSWORD=${DB_PASSWORD:-change-me}"
      - "DB_DATABASE=${DB_DATABASE:-app}"
      - "APP_NAME=${APP_NAME:-Lychee}"
      - "APP_URL=${APP_URL:-}"
      - "TRUSTED_PROXIES=${TRUSTED_PROXIES:-}"
    volumes:
      - "/srv/lsio/lychee/config:/config"
      - "/srv/lsio/lychee/pictures:/pictures"
