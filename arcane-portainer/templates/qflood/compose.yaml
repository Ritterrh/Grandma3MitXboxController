services:
  qflood:
    image: "hotio/qflood:latest"
    container_name: ${CONTAINER_NAME:-qflood}
    restart: "unless-stopped"
    ports:
      - "3000:3000/tcp"
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "UMASK=${UMASK:-002}"
      - "TZ=${TZ:-America/New_York}"
      - "FLOOD_AUTH=${FLOOD_AUTH:-false}"
    volumes:
      - "/portainer/Files/AppData/Config/qFlood:/config"
      - "/portainer/Downloads:/app/qBittorrent/downloads"
