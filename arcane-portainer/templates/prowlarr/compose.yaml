services:
  prowlarr:
    image: "linuxserver/prowlarr:latest"
    container_name: ${CONTAINER_NAME:-prowlarr}
    restart: "unless-stopped"
    ports:
      - "9696:9696/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/prowlarr/config:/config"
