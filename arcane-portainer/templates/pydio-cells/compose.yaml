services:
  pydio-cells:
    image: "linuxserver/pydio-cells:latest"
    container_name: ${CONTAINER_NAME:-pydio-cells}
    restart: "unless-stopped"
    ports:
      - "8080:8080/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "EXTERNALURL=${EXTERNALURL:-yourdomain.url}"
      - "SERVER_IP=${SERVER_IP:-0.0.0.0}"
    volumes:
      - "/srv/lsio/pydio-cells/config:/config"
