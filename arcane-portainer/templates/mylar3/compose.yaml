services:
  mylar3:
    image: "linuxserver/mylar3:latest"
    container_name: ${CONTAINER_NAME:-mylar3}
    restart: "unless-stopped"
    ports:
      - "8090:8090/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/mylar3/config:/config"
      - "/srv/lsio/mylar3/comics:/comics"
      - "/srv/lsio/mylar3/downloads:/downloads"
