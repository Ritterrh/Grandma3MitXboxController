services:
  ferdi-server:
    image: getferdi/ferdi-server
    container_name: ferdi-server
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - EXTERNAL_DOMAIN=${EXTERNAL_DOMAIN:-localhost}
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_HOST=${DB_HOST:-127.0.0.1}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-change-me}
      - DB_DATABASE=${DB_DATABASE:-ferdi}
      - DB_SSL=${DB_SSL:-false}
      - MAIL_CONNECTION=${MAIL_CONNECTION:-smtp}
      - SMPT_HOST=${SMPT_HOST:-127.0.0.1}
      - SMTP_PORT=${SMTP_PORT:-2525}
      - MAIL_SSL=${MAIL_SSL:-false}
      - MAIL_USERNAME=${MAIL_USERNAME:-username}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-change-me}
      - MAIL_SENDER=${MAIL_SENDER:-noreply@getferdi.com}
      - IS_CREATION_ENABLED=${IS_CREATION_ENABLED:-true}
      - IS_DASHBOARD_ENABLED=${IS_DASHBOARD_ENABLED:-true}
      - IS_REGISTRATION_ENABLED=${IS_REGISTRATION_ENABLED:-true}
      - CONNECT_WITH_FRANZ=${CONNECT_WITH_FRANZ:-false}
      - DATA_DIR=${DATA_DIR:-/data}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ferdi-database-vol:/data
      - ferdi-recipes-vol:/app/recipes
    ports:
      - 3333:3333
    restart: unless-stopped
volumes:
  ferdi-database-vol:
  ferdi-recipes-vol:
