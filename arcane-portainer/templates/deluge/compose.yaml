services:
  deluge:
    image: "linuxserver/deluge:latest"
    container_name: ${CONTAINER_NAME:-deluge}
    restart: "unless-stopped"
    ports:
      - "8112:8112/tcp"
      - "6881:6881/tcp"
      - "6881:6881/udp"
      - "58846:58846/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
      - "DELUGE_LOGLEVEL=${DELUGE_LOGLEVEL:-error}"
    volumes:
      - "/srv/lsio/deluge/config:/config"
      - "/srv/lsio/deluge/downloads:/downloads"
