services:
  lazytainer:
    container_name: lazytainer
    image: ghcr.io/vmorganp/lazytainer:master
    environment:
      - PORT=${PORT:-81,82}
      - LABEL=${LABEL:-lazytainer}
      - TIMEOUT=${TIMEOUT:-30}
      - MINPACKETTHRESH=${MINPACKETTHRESH:-10}
      - POLLRATE=${POLLRATE:-1}
      - VERBOSE=${VERBOSE:-true}
      - INTERFACE=${INTERFACE:-eth0}
    ports:
      - 81:81
      - 82:82
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  whoami1:
    container_name: whoami1
    image: containous/whoami
    command: --port 81
    network_mode: service:lazytainer
    depends_on:
      - lazytainer
    labels:
      - "lazytainer.marker=lazytainer"
      - "lazytainer.sleepMethod=pause"  # can be either "stop" or "pause", or left blank for stop

  whoami2:
    container_name: whoami2
    image: containous/whoami
    command: --port 82
    network_mode: service:lazytainer
    depends_on:
      - lazytainer
    labels:
      - "lazytainer.marker=lazytainer"
      - "lazytainer.sleepMethod=stop"  # can be either "stop" or "pause", or left blank for stop
