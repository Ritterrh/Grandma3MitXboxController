services:
  sickgear:
    image: "linuxserver/sickgear:latest"
    container_name: ${CONTAINER_NAME:-sickgear}
    restart: "unless-stopped"
    ports:
      - "8081:8081/tcp"
    environment:
      - "PUID=${PUID:-1000}"
      - "PGID=${PGID:-1000}"
      - "TZ=${TZ:-Etc/UTC}"
    volumes:
      - "/srv/lsio/sickgear/config:/config"
      - "/srv/lsio/sickgear/tv:/tv"
      - "/srv/lsio/sickgear/downloads:/downloads"
