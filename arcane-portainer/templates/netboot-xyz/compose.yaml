services:
  netbootxyz:
    image: lscr.io/linuxserver/netbootxyz:latest
    container_name: netbootxyz
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Athens}
      - PORT_RANGE=${PORT_RANGE:-30000:30010}
      - SUBFOLDER=${SUBFOLDER:-/}
    volumes:
      - /portainer/Files/AppData/Config/netbootxyz/config:/config # optional
      - /portainer/Files/AppData/Config/netbootxyz/assets:/assets # optional
    ports:
      - 3300:3000
      - 369:69/udp
      - 38080:80 #optional
    restart: unless-stopped
